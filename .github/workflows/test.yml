name: test

# 006-0-1: テスト基盤 CI。
# push / PR で typecheck と vitest (miniflare D1) を実行する。
# secrets 不要 (本番 D1 / Cloudflare には接続しない。miniflare のプロセス内
# SQLite のみ使用)。

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (production tsconfig)
        run: npm run typecheck

      - name: Run tests (vitest + miniflare D1)
        run: npm run test

  # 006-cd: ビルドゲート。フロントの vite build と worker の型付きバンドルが
  # 壊れていないかを CD 前に PR で保証する。wrangler --dry-run はアップロードせず
  # ローカルでバンドルするだけなので secret 不要 (本番には一切接続しない)。
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build:frontend

      # public/ を読み込んで worker をバンドル検証する (dry-run: 実 deploy はしない)。
      - name: Bundle worker (wrangler dry-run)
        run: npx wrangler deploy --dry-run --outdir /tmp/wrangler-dry

  # Phase4-0: FE 安全網ジョブ。BE job (workerd pool) とは別 job に分離し、
  # jsdom 実行環境が BE と干渉しないようにする。secrets 不要
  # (API は fetch を stub。本番 D1 / Cloudflare / Slack には接続しない)。
  # Phase4-1 で types.ts ドメイン分割 + 既存 FE 型エラー解消済み。
  # typecheck:frontend は必須ゲート。
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Phase4-1 で FE 型エラーを 0 件にしたため必須ゲートに昇格。
      # 以降 Phase4 全 PR で typecheck:frontend が緑であることを強制する。
      - name: Typecheck (frontend tsconfig)
        run: npm run typecheck:frontend

      - name: Run FE smoke tests (vitest + jsdom)
        run: npm run test:fe

  # E2E (実ブラウザ): 管理コンソール /admin のユーザー動線を Chromium で踏む。
  # Playwright が wrangler dev --local を自動起動し、ローカル D1 に migration +
  # seed してから実行する。secrets 不要 (ADMIN_TOKEN はテスト専用値を --var 注入)。
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # public/ (Workers Assets) は gitignore のため CI では都度ビルドする。
      # これが無いと wrangler dev が assets.directory 不在で起動できない。
      - name: Build frontend assets
        run: npm run build:frontend

      - name: Run E2E (Playwright + wrangler dev)
        run: npm run e2e

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
