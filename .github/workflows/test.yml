name: test

# 006-0-1: テスト基盤 CI。
# push / PR で typecheck と vitest (miniflare D1) を実行する。
# secrets 不要 (本番 D1 / Cloudflare には接続しない。miniflare のプロセス内
# SQLite のみ使用)。

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (production tsconfig)
        run: npm run typecheck

      - name: Run tests (vitest + miniflare D1)
        run: npm run test

  # Phase4-0: FE 安全網ジョブ。BE job (workerd pool) とは別 job に分離し、
  # jsdom 実行環境が BE と干渉しないようにする。secrets 不要
  # (API は fetch を stub。本番 D1 / Cloudflare / Slack には接続しない)。
  # typecheck:frontend が現状 FE 型エラーで落ちる場合は Phase4 で解消する
  # 技術的負債 (本 PR では安全網の新設のみが目的)。
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # 既知の FE 型エラー (Phase4-0 で可視化した技術的負債) が解消されるまで
      # この step は赤になるが、安全網の中核であるスモーク (下) を
      # ブロックしないよう continue-on-error にする。
      # Phase4 の最初の PR で 0 件にしたら continue-on-error を外し、
      # 以降 Phase4 全 PR の必須ゲートに昇格させる。
      - name: Typecheck (frontend tsconfig)
        run: npm run typecheck:frontend
        continue-on-error: true

      - name: Run FE smoke tests (vitest + jsdom)
        run: npm run test:fe
