name: test

# 006-0-1: テスト基盤 CI。
# push / PR で typecheck と vitest (miniflare D1) を実行する。
# secrets 不要 (本番 D1 / Cloudflare には接続しない。miniflare のプロセス内
# SQLite のみ使用)。

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (production tsconfig)
        run: npm run typecheck

      - name: Run tests (vitest + miniflare D1)
        run: npm run test

  # Phase4-0: FE 安全網ジョブ。BE job (workerd pool) とは別 job に分離し、
  # jsdom 実行環境が BE と干渉しないようにする。secrets 不要
  # (API は fetch を stub。本番 D1 / Cloudflare / Slack には接続しない)。
  # Phase4-1 で types.ts ドメイン分割 + 既存 FE 型エラー解消済み。
  # typecheck:frontend は必須ゲート。
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Phase4-1 で FE 型エラーを 0 件にしたため必須ゲートに昇格。
      # 以降 Phase4 全 PR で typecheck:frontend が緑であることを強制する。
      - name: Typecheck (frontend tsconfig)
        run: npm run typecheck:frontend

      - name: Run FE smoke tests (vitest + jsdom)
        run: npm run test:fe
